plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
    id 'java'
    id 'edu.sc.seis.launch4j' version '2.5.0'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}


dependencies {
    // https://mvnrepository.com/artifact/org.xerial/sqlite-jdbc
    implementation 'org.xerial:sqlite-jdbc:3.42.0.0'
    // https://mvnrepository.com/artifact/com.fasterxml.jackson.core/jackson-databind
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.15.2'
    // https://mvnrepository.com/artifact/commons-io/commons-io
    implementation 'commons-io:commons-io:2.13.0'
}


application {
    // Define the main class for the application.
    mainClass = 'Main'
}


java {
  toolchain {
    languageVersion.set(JavaLanguageVersion.of(17))
  }
}

compileJava {
  sourceCompatibility = '17'
  targetCompatibility = '17'
}

/*
jar {

    duplicatesStrategy = 'include'

    manifest {
        attributes(
                'Main-Class': 'Main'
        )
    }
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
 }
*/

launch4j {      
    mainClassName = 'Main'
    outfile = 'Comparecencias MTSS.exe'
    icon = "${rootDir}/resources/trademarks/icon.ico"
    splashFileName = "${rootDir}/resources/trademarks/splash-screen.bmp"
    bundledJrePath = 'jre'
    bundledJre64Bit = true
    jreMinVersion = '17'
}


task packageExecutableDistribution(type: Zip) {
    archiveName = "COMPARECENCIAS-MTSS.zip"
    destinationDir = file("$buildDir/distExecutable")

    from "$buildDir/launch4j"
}

task addJreToDistributable(type: Copy) {
    from zipTree("${rootDir}/resources/jre/OpenJRE17.zip")
    destinationDir = file("$buildDir/launch4j")
}

task addSQLiteToDistributable(type: Copy) {
    from "${rootDir}/resources/sqlite/comparecencias.db"
    destinationDir = file("$buildDir/launch4j/database")
}

task addManualDeUsuario(type: Copy) {
    from "${rootDir}/resources/docs/Manual de Usuario.pdf"
    destinationDir = file("$buildDir/launch4j")
}

tasks.register('avisoExe') {
    doLast {
        println '/!\\ ATENCION /!\\'
        println 'Parece que estas creando un exe.'
        println 'Recuerda remplazar el Path de la base de datos en ConexionDatabase.java.'     
    }
}

packageExecutableDistribution.dependsOn createExe
createExe.dependsOn addJreToDistributable
createExe.dependsOn addSQLiteToDistributable
createExe.dependsOn addManualDeUsuario
createExe.dependsOn avisoExe