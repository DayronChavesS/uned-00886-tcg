plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
    id 'java'
    id 'edu.sc.seis.launch4j' version '2.5.0'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    //https://mvnrepository.com/artifact/com.mysql/mysql-connector-j/8.0.33
    implementation 'com.mysql:mysql-connector-j:8.0.33'
}

application {
    // Define the main class for the application.
    mainClass = 'Main'
}


java {
  toolchain {
    languageVersion.set(JavaLanguageVersion.of(17))
  }
}

compileJava {
  sourceCompatibility = '17'
  targetCompatibility = '17'
}

/*
jar {

    duplicatesStrategy = 'include'

    manifest {
        attributes(
                'Main-Class': 'Main'
        )
    }
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
 }
*/

launch4j {      
    mainClassName = 'Main'
    outfile = 'AppServidor.exe'
    icon = "${rootDir}/resources/trademarks/icon.ico"
    splashFileName = "${rootDir}/resources/trademarks/splash-screen.bmp"
    bundledJrePath = 'jre'
    bundledJre64Bit = true
    jreMinVersion = '17'
}


task packageExecutableDistribution(type: Zip) {
    archiveName = "APPSERVIDOR.zip"
    destinationDir = file("$buildDir/distExecutable")

    from "$buildDir/launch4j"
}

task addJreToDistributable(type: Copy) {
    from zipTree("${rootDir}/resources/jre/OpenJRE17.zip")
    destinationDir = file("$buildDir/launch4j")
}

packageExecutableDistribution.dependsOn createExe
createExe.dependsOn addJreToDistributable